name: Deploy Frontend Support to S3

on:
  push:
    branches: [main]
    paths:
      - 'apps/frontendsupport/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-frontendsupport.yml'

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: "us-east-1"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Creating .npmrc
        run: |
          "${GITHUB_WORKSPACE}/scripts/create-npmrc.sh" "${{ secrets.NPM_TOKEN }}"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm turbo run build --filter=@cutting/frontend-support

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Deploy to S3 and invalidate CloudFront
        run: |
          cd apps/frontendsupport
          ACCOUNT="$(aws sts get-caller-identity --query Account --output text)"
          BUCKET="frontendsupport-site-${ACCOUNT}"
          aws s3 sync dist/client "s3://${BUCKET}" --delete
          DIST_ID="$(aws cloudfront list-distributions --query "DistributionList.Items[?contains(Aliases.Items, 'frontendrescue.scot')].Id" --output text)"
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
